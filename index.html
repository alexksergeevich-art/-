<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Dragon Spawn Demo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="appShell">
    <aside id="controlPanel" aria-label="Панель спавна">
      <div class="panelTitle">СПАВН</div>
      <button class="spawnBtn level1" data-level="1">1 · LVL 1</button>
      <button class="spawnBtn level2" data-level="2">2 · LVL 2</button>
      <button class="spawnBtn level3" data-level="3">3 · LVL 3</button>
      <button class="spawnBtn level4" data-level="4">4 · LVL 4</button>
      <button class="spawnBtn level5" data-level="5">5 · LVL 5</button>
      <button id="devToggleBtn" class="spawnBtn devBtn">DEV</button>
      <div id="statusText">Нажми на кнопку уровня, чтобы добавить героя в очередь. Герой сам выйдет из кольца и пойдет к дракону по своему маршруту.</div>
    </aside>

    <div id="stageFrame" aria-label="Игровая область 9 на 16">
      <div id="stage">
        <div id="bg"></div>
        <div id="ringsLayer"></div>
        <div id="entitiesLayer"></div>
        <div id="fxLayer"></div>
        <div id="debugLayer"></div>
        <div id="dragon" class="entity dragon">
          <div class="hplabel" id="dragonLabel">Dragon 800/800</div>
          <div class="hpbar"><div class="hpfill dragonFill" id="dragonHP"></div></div>
          <div class="sprite" id="dragonSprite"></div>
        </div>
        <div id="moveMarker"></div>
      </div>
    </div>

    <aside id="devPanel" hidden aria-label="Панель разработчика">
      <div class="panelTitle">DEV PANEL</div>

      <div class="devSection">
        <div class="devLabel">Выбранный объект</div>
        <select id="devTarget"></select>
        <div class="devTargetName" id="devTargetName">—</div>
        <div class="devRow2">
          <label>X <input id="devX" type="number" min="0" max="1" step="0.001" /></label>
          <label>Y <input id="devY" type="number" min="0" max="1" step="0.001" /></label>
        </div>
      </div>

      <div class="devSection">
        <div class="devLabel">Масштаб героев</div>
        <div class="devGrid">
          <label>L1 <input id="heroScale1" type="range" min="0.5" max="1.8" step="0.01" /></label>
          <label>L2 <input id="heroScale2" type="range" min="0.5" max="1.8" step="0.01" /></label>
          <label>L3 <input id="heroScale3" type="range" min="0.5" max="1.8" step="0.01" /></label>
          <label>L4 <input id="heroScale4" type="range" min="0.5" max="1.8" step="0.01" /></label>
          <label>L5 <input id="heroScale5" type="range" min="0.5" max="1.8" step="0.01" /></label>
        </div>
        <label class="devBlock">Дракон <input id="dragonScale" type="range" min="0.5" max="1.6" step="0.01" /></label>
      </div>

      <div class="devSection">
        <div class="devLabel">Перспектива</div>
        <label class="devBlock">Hero near <input id="heroNearScale" type="range" min="0.4" max="1.4" step="0.01" /></label>
        <label class="devBlock">Hero far <input id="heroFarScale" type="range" min="0.08" max="1.0" step="0.01" /></label>
        <label class="devBlock">Dragon near <input id="dragonNearScale" type="range" min="0.4" max="1.5" step="0.01" /></label>
        <label class="devBlock">Dragon far <input id="dragonFarScale" type="range" min="0.3" max="1.2" step="0.01" /></label>
        <label class="devBlock">Shift near <input id="perspectiveNearShift" type="range" min="-0.05" max="0.05" step="0.001" /></label>
        <label class="devBlock">Shift far <input id="perspectiveFarShift" type="range" min="-0.05" max="0.05" step="0.001" /></label>
      </div>

      <div class="devSection">
        <div class="devLabel">Зоны удара дракона</div>
        <label class="devBlock">AOE rx <input id="aoeRadiusX" type="range" min="0.05" max="0.30" step="0.001" /></label>
        <label class="devBlock">AOE ry <input id="aoeRadiusY" type="range" min="0.02" max="0.18" step="0.001" /></label>
        <label class="devBlock">Side rx <input id="sideRadiusX" type="range" min="0.05" max="0.22" step="0.001" /></label>
        <label class="devBlock">Side ry <input id="sideRadiusY" type="range" min="0.02" max="0.14" step="0.001" /></label>
      </div>

      <div class="devSection">
        <div class="devLabel">JSON данных</div>
        <pre id="devExport"></pre>
        <div class="devBtns">
          <button id="devCopyBtn" class="spawnBtn mini">COPY</button>
          <button id="devSaveBtn" class="spawnBtn mini">SAVE</button>
          <button id="devResetBtn" class="spawnBtn mini danger">RESET</button>
        </div>
        <div id="devStat" class="devStat">—</div>
      </div>
    </aside>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
