<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>Dragon Arena Stream Build</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div id="appShell">
    <aside id="controlPanel" aria-label="Панель спавна">
      <div class="panelTitle">SUMMON QUEUE</div>
      <button class="spawnBtn level1" data-level="1">1 · LVL 1</button>
      <button class="spawnBtn level2" data-level="2">2 · LVL 2</button>
      <button class="spawnBtn level3" data-level="3">3 · LVL 3</button>
      <button class="spawnBtn level4" data-level="4">4 · LVL 4</button>
      <button class="spawnBtn level5" data-level="5">5 · LVL 5</button>
      <div id="statusText">Нажми на уровень, чтобы призвать героя. Во время смерти или эволюции дракона новые герои автоматически встают в очередь до нового раунда.</div>
    </aside>

    <div id="stageFrame" aria-label="Игровая область 9 на 16">
      <div id="stage">
        <div id="bg"></div>
        <div id="ringsLayer"></div>
        <div id="entitiesLayer"></div>
        <div id="fxLayer"></div>
        <div id="dragon" class="entity dragon">
          <div class="hplabel" id="dragonLabel">Dragon 800/800</div>
          <div class="hpbar"><div class="hpfill dragonFill" id="dragonHP"></div></div>
          <div class="sprite" id="dragonSprite"></div>
        </div>
        <div id="moveMarker"></div>
        <div id="editorLayer"></div>
      </div>
    </div>
  </div>

  <button id="devWidgetToggle" class="dev-widget-toggle" type="button" aria-label="Открыть панель разработчика">DEV</button>
  <aside id="devWidget" class="dev-widget hidden" aria-label="Панель разработчика">
    <div class="dev-widget-header">
      <span>Developer Panel</span>
      <div class="dev-widget-header-actions">
        <button id="devHandlesToggle" class="dev-mini-btn" type="button">Точки: ON</button>
        <button id="devWidgetClose" class="dev-mini-btn danger" type="button">✕</button>
      </div>
    </div>
    <div class="dev-widget-body">
      <div class="dev-widget-row">
        <button id="devCompactToggle" class="dev-chip" type="button">Свернуть секции</button>
        <button id="devResetView" class="dev-chip" type="button">Сбросить вид</button>
      </div>
      <div class="dev-widget-sections" id="devWidgetSections"></div>
      <label class="dev-label" for="devExportBox">JSON позиций</label>
      <textarea id="devExportBox" readonly spellcheck="false"></textarea>
    </div>
  </aside>

  <script type="module" src="main.js"></script>
</body>
</html>
